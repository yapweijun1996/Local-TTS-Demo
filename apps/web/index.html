<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="description" content="Browser-first TTS — Kokoro & Piper ONNX, 100% local, no cloud" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <title>Local TTS Demo — Kokoro Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 24px;
      font-size: 1.1rem;
      font-weight: 600;
    }
    main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus-visible {
      outline: 2px solid #1a1a1a;
      outline-offset: 2px;
      border-color: #1a1a1a;
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    select, button {
      padding: 10px 16px;
      font-size: 0.95rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: inherit;
    }
    select:focus-visible, button:focus-visible {
      outline: 2px solid #1a1a1a;
      outline-offset: 2px;
    }
    button {
      background: #1a1a1a;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
      min-width: 140px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #333; }
    progress {
      width: 100%;
      height: 8px;
      display: none;
    }
    .progress {
      font-size: 0.9rem;
      color: #666;
      min-height: 1.2em;
    }
    .error {
      color: #d00;
      background: #fdd;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }
    .error.visible { display: block; }
    audio { width: 100%; margin-top: 4px; }
    .download-row { display: none; }
    .download-row.visible { display: flex; gap: 12px; align-items: center; }
    label { font-weight: 600; font-size: 0.9rem; }
    .debug-panel {
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      padding: 10px 12px 12px;
      background: #fff;
    }
    .debug-panel summary {
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .debug-status-wrap {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .debug-status {
      color: #555;
      font-size: 0.88rem;
      min-height: 1.2em;
      flex: 1;
      word-break: break-all;
    }
    .debug-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .debug-actions button {
      min-width: auto;
      font-size: 0.84rem;
      padding: 6px 12px;
    }
    .debug-log {
      max-height: 230px;
      overflow: auto;
      padding: 10px;
      margin: 0;
      background: #111;
      color: #e8e8e8;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.82rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid #222;
    }

    /* -- History panel -- */
    #history-panel {
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #e8e8e8;
      gap: 12px;
    }
    .history-header h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0;
      color: #1a1a1a;
    }
    .history-storage-label {
      font-size: 0.78rem;
      color: #999;
      flex: 1;
      text-align: right;
      padding-right: 8px;
    }
    #history-clear-btn {
      background: #555;
      font-size: 0.82rem;
      padding: 5px 12px;
      min-width: auto;
      border-radius: 5px;
    }
    #history-clear-btn:hover:not(:disabled) { background: #333; }
    #history-list {
      display: flex;
      flex-direction: column;
    }
    .history-item {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .history-time {
      font-size: 0.8rem;
      color: #888;
    }
    .history-engine {
      font-size: 0.8rem;
      background: #f0f0f0;
      border-radius: 4px;
      padding: 1px 6px;
      color: #444;
      font-weight: 500;
    }
    .history-size {
      font-size: 0.8rem;
      color: #aaa;
      margin-left: auto;
    }
    .history-text {
      font-size: 0.88rem;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-actions {
      display: flex;
      gap: 8px;
    }
    .history-actions button {
      font-size: 0.8rem;
      padding: 5px 11px;
      min-width: auto;
      border-radius: 5px;
    }
    .history-play-btn { background: #1a7f3c; }
    .history-play-btn:hover:not(:disabled) { background: #155f2d; }
    .history-dl-btn { background: #0060b8; }
    .history-dl-btn:hover:not(:disabled) { background: #004a8f; }
    .history-del-btn { background: #a00; }
    .history-del-btn:hover:not(:disabled) { background: #800; }
    #history-empty {
      padding: 20px 16px;
      text-align: center;
      color: #aaa;
      font-size: 0.88rem;
    }

    @media (max-width: 480px) {
      header { padding: 12px 16px; font-size: 1rem; }
      main { padding: 16px 12px; gap: 14px; }
      .row { flex-direction: column; align-items: stretch; gap: 8px; }
      .row > div { display: flex; flex-direction: column; }
      button { width: 100%; min-width: auto; }
      textarea { min-height: 100px; font-size: 16px; }
      .debug-status-wrap { flex-direction: column; align-items: stretch; }
      .debug-actions button { width: 100%; }
      .debug-log { max-height: 180px; }
    }
  </style>
</head>
<body>
  <header>🎙️ Local TTS Demo — Kokoro (Browser)</header>
  <main>
    <div>
      <label for="text-input">Text</label>
      <textarea
        id="text-input"
        aria-describedby="progress error"
        placeholder="Enter text to convert to speech…"
      >Hello, welcome to the Local TTS Demo. This is running entirely in your browser — no server, no API keys, no cloud.</textarea>
    </div>

    <div class="row">
      <div>
        <label for="voice-select">Voice</label>
        <select id="voice-select" aria-label="Select a TTS voice"></select>
      </div>
      <div>
        <label for="engine-select">Engine</label>
        <select id="engine-select" aria-label="Select a TTS engine"></select>
      </div>
      <button
        id="reset-piper-btn"
        aria-label="Clear Piper model cache and re-download"
        style="background:#d00;font-size:0.8rem;min-width:auto;padding:6px 12px;"
      >↻ Reset Piper</button>
    </div>

    <button id="generate-btn" aria-label="Generate speech from text">🎤 Generate Speech</button>
    <button
      id="cancel-btn"
      aria-label="Cancel speech generation"
      style="background:#a00000;display:none;"
      disabled
    >✖ Cancel</button>
    <progress id="dl-progress" max="100" value="0" aria-label="Model download progress"></progress>
    <div id="progress" class="progress" role="status" aria-live="polite"></div>

    <div id="error" class="error" role="alert" aria-live="assertive"></div>

    <div id="player-row" style="display:none;">
      <label for="audio-player">Preview</label>
      <audio id="audio-player" controls aria-label="Generated speech audio player"></audio>
    </div>

    <div id="download-row" class="download-row">
      <button id="download-btn" aria-label="Download generated audio as WAV">⬇ Download WAV</button>
    </div>

    <section id="history-panel" aria-label="Generation history">
      <div class="history-header">
        <h2>&#128336; History</h2>
        <span id="history-storage-used" class="history-storage-label" aria-live="polite"></span>
        <button id="history-clear-btn" aria-label="Clear all history">Clear All</button>
      </div>
      <div id="history-list" role="list" aria-label="Past generations"></div>
      <p id="history-empty" style="display:none;">No generations yet. Your WAV files will appear here (up to 50 MB total).</p>
    </section>

    <details id="debug-panel" class="debug-panel">
      <summary>Debug log</summary>
      <div class="debug-status-wrap">
        <div id="debug-status" class="debug-status"></div>
        <div class="debug-actions">
          <button id="copy-debug-log-btn" aria-label="Copy debug log">Copy</button>
          <button
            id="clear-debug-log-btn"
            aria-label="Clear debug log"
            style="background:#444;"
          >Clear</button>
        </div>
      </div>
      <pre id="debug-log" class="debug-log" aria-live="polite"></pre>
    </details>
  </main>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
