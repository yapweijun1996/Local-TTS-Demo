<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="description" content="Browser-first TTS — Kokoro & Piper ONNX, 100% local, no cloud" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <title>Local TTS Demo — Kokoro Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5; color: #1a1a1a;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    header {
      background: #1a1a1a; color: #fff;
      padding: 16px 24px; font-size: 1.1rem; font-weight: 600;
    }
    main {
      flex: 1; max-width: 680px; width: 100%; margin: 0 auto;
      padding: 24px 16px; display: flex; flex-direction: column; gap: 20px;
    }
    textarea {
      width: 100%; min-height: 120px; padding: 12px; font-size: 1rem;
      border: 1px solid #ccc; border-radius: 6px; resize: vertical;
      font-family: inherit;
    }
    textarea:focus-visible {
      outline: 2px solid #1a1a1a; outline-offset: 2px; border-color: #1a1a1a;
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    select, button {
      padding: 10px 16px; font-size: 0.95rem; border-radius: 6px;
      border: 1px solid #ccc; font-family: inherit;
    }
    select:focus-visible, button:focus-visible {
      outline: 2px solid #1a1a1a; outline-offset: 2px;
    }
    button {
      background: #1a1a1a; color: #fff; border: none; cursor: pointer;
      font-weight: 600; min-width: 140px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #333; }
    progress {
      width: 100%; height: 8px; display: none;
    }
    .progress {
      font-size: 0.9rem; color: #666; min-height: 1.2em;
    }
    .error {
      color: #d00; background: #fdd; padding: 12px; border-radius: 6px;
      font-size: 0.9rem; display: none;
    }
    .error.visible { display: block; }
    audio { width: 100%; margin-top: 4px; }
    .download-row { display: none; }
    .download-row.visible { display: flex; gap: 12px; align-items: center; }
    label { font-weight: 600; font-size: 0.9rem; }

    /* Mobile — stack controls vertically, full-width buttons */
    @media (max-width: 480px) {
      header { padding: 12px 16px; font-size: 1rem; }
      main { padding: 16px 12px; gap: 14px; }
      .row { flex-direction: column; align-items: stretch; gap: 8px; }
      .row > div { display: flex; flex-direction: column; }
      button { width: 100%; min-width: auto; }
      textarea { min-height: 100px; font-size: 16px; } /* prevent iOS zoom */
    }
  </style>
</head>
<body>
  <header>🔊 Local TTS Demo — Kokoro (Browser)</header>
  <main>
    <div>
      <label for="text-input">Text</label>
      <textarea
        id="text-input"
        aria-describedby="progress error"
        placeholder="Enter text to convert to speech…"
      >Hello, welcome to the Local TTS Demo. This is running entirely in your browser — no server, no API keys, no cloud.</textarea>
    </div>

    <div class="row">
      <div>
        <label for="voice-select">Voice</label>
        <select id="voice-select" aria-label="Select a TTS voice"></select>
      </div>
      <div>
        <label for="engine-select">Engine</label>
        <select id="engine-select" aria-label="Select a TTS engine"></select>
      </div>
      <button
        id="reset-piper-btn"
        aria-label="Clear Piper model cache and re-download"
        style="background:#d00;font-size:0.8rem;min-width:auto;padding:6px 12px;"
      >↻ Reset Piper</button>
    </div>

    <button id="generate-btn" aria-label="Generate speech from text">⚡ Generate Speech</button>
    <progress id="dl-progress" max="100" value="0" aria-label="Model download progress"></progress>
    <div id="progress" class="progress" role="status" aria-live="polite"></div>

    <div id="error" class="error" role="alert" aria-live="assertive"></div>

    <div id="player-row" style="display:none;">
      <label for="audio-player">Preview</label>
      <audio id="audio-player" controls aria-label="Generated speech audio player"></audio>
    </div>

    <div id="download-row" class="download-row">
      <button id="download-btn" aria-label="Download generated audio as WAV">⬇ Download WAV</button>
    </div>
  </main>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
